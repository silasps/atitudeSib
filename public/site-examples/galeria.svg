<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#fb7185;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Background blur shapes -->
  <circle cx="650" cy="150" r="220" fill="#a78bfa" opacity="0.15"/>
  <circle cx="150" cy="650" r="200" fill="#ec4899" opacity="0.15"/>

  <!-- Mini gallery grid preview inside -->
  <!-- Row 1 -->
  <rect x="80" y="100" width="180" height="180" rx="14" fill="url(#card1)"/>
  <circle cx="170" cy="190" r="40" fill="white" opacity="0.12"/>

  <rect x="310" y="100" width="180" height="180" rx="14" fill="url(#card2)"/>
  <circle cx="400" cy="190" r="50" fill="white" opacity="0.1"/>

  <rect x="540" y="100" width="180" height="180" rx="14" fill="url(#card1)"/>
  <rect x="570" y="210" width="120" height="40" rx="8" fill="white" opacity="0.1"/>

  <!-- Row 2 -->
  <rect x="80" y="320" width="180" height="180" rx="14" fill="url(#card2)"/>
  <rect x="100" y="380" width="140" height="80" rx="8" fill="white" opacity="0.1"/>

  <!-- Highlighted center card (active/selected look) -->
  <rect x="310" y="310" width="200" height="200" rx="16" fill="white" opacity="0.25"/>
  <rect x="308" y="308" width="204" height="204" rx="17" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.7"/>
  <circle cx="410" cy="410" rx="50" ry="50" r="50" fill="white" opacity="0.15"/>
  <!-- Camera icon suggestion -->
  <rect x="385" y="388" width="50" height="40" rx="8" fill="white" opacity="0.3"/>
  <circle cx="410" cy="408" r="12" fill="white" opacity="0.4"/>

  <rect x="540" y="320" width="180" height="180" rx="14" fill="url(#card1)"/>
  <ellipse cx="630" cy="410" rx="60" ry="40" fill="white" opacity="0.1"/>

  <!-- Row 3 -->
  <rect x="80" y="540" width="180" height="160" rx="14" fill="url(#card1)"/>
  <rect x="310" y="540" width="180" height="160" rx="14" fill="url(#card2)"/>
  <rect x="540" y="540" width="180" height="160" rx="14" fill="url(#card1)"/>

  <!-- Label -->
  <rect x="20" y="20" width="190" height="28" rx="6" fill="black" opacity="0.3"/>
  <text x="115" y="39" font-family="system-ui,sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.9">Foto da galeria · 800×800</text>
</svg>
