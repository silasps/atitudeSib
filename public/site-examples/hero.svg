<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- Abstract shapes suggesting crowd/community -->
  <circle cx="120" cy="480" r="200" fill="#3b82f6" opacity="0.12"/>
  <circle cx="840" cy="60" r="250" fill="#7c3aed" opacity="0.15"/>
  <circle cx="480" cy="540" r="180" fill="#2563eb" opacity="0.1"/>

  <!-- Subtle grid/texture -->
  <line x1="0" y1="180" x2="960" y2="180" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="360" x2="960" y2="360" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="540" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="540" stroke="white" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Abstract people silhouettes (minimal) -->
  <ellipse cx="300" cy="400" rx="18" ry="18" fill="white" opacity="0.08"/>
  <rect x="291" y="418" width="18" height="40" rx="9" fill="white" opacity="0.08"/>
  <ellipse cx="380" cy="390" rx="18" ry="18" fill="white" opacity="0.1"/>
  <rect x="371" y="408" width="18" height="40" rx="9" fill="white" opacity="0.1"/>
  <ellipse cx="460" cy="395" rx="18" ry="18" fill="white" opacity="0.08"/>
  <rect x="451" y="413" width="18" height="40" rx="9" fill="white" opacity="0.08"/>
  <ellipse cx="540" cy="388" rx="18" ry="18" fill="white" opacity="0.1"/>
  <rect x="531" y="406" width="18" height="40" rx="9" fill="white" opacity="0.1"/>
  <ellipse cx="620" cy="398" rx="18" ry="18" fill="white" opacity="0.08"/>
  <rect x="611" y="416" width="18" height="40" rx="9" fill="white" opacity="0.08"/>

  <!-- Logo placeholder circle -->
  <circle cx="480" cy="180" r="44" fill="white" opacity="0.15"/>
  <circle cx="480" cy="180" r="44" fill="none" stroke="white" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Title placeholder bars -->
  <rect x="310" y="250" width="340" height="22" rx="11" fill="white" opacity="0.25"/>
  <rect x="370" y="284" width="220" height="14" rx="7" fill="white" opacity="0.15"/>

  <!-- CTA button placeholder -->
  <rect x="408" y="320" width="144" height="38" rx="19" fill="white" opacity="0.2"/>

  <!-- Bottom gradient overlay (like the actual site) -->
  <rect x="0" y="400" width="960" height="140" fill="url(#glow)"/>

  <!-- Label -->
  <rect x="20" y="20" width="200" height="28" rx="6" fill="black" opacity="0.35"/>
  <text x="120" y="39" font-family="system-ui,sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.9">Banner principal · 1920×1080</text>
</svg>
