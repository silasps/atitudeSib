<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="70%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="150" r="300" fill="#14b8a6" opacity="0.12"/>
  <circle cx="200" cy="500" r="250" fill="#3b82f6" opacity="0.12"/>

  <!-- Abstract document/content shapes -->
  <!-- Photo placeholder top area -->
  <rect x="80" y="80" width="440" height="280" rx="16" fill="white" opacity="0.08"/>
  <circle cx="300" cy="220" r="60" fill="white" opacity="0.1"/>
  <!-- Abstract landscape inside -->
  <ellipse cx="300" cy="330" rx="180" ry="40" fill="white" opacity="0.06"/>

  <!-- Text lines on right -->
  <rect x="600" y="100" width="520" height="20" rx="10" fill="white" opacity="0.2"/>
  <rect x="600" y="136" width="400" height="20" rx="10" fill="white" opacity="0.15"/>
  <rect x="600" y="172" width="460" height="14" rx="7" fill="white" opacity="0.1"/>
  <rect x="600" y="198" width="420" height="14" rx="7" fill="white" opacity="0.1"/>
  <rect x="600" y="224" width="380" height="14" rx="7" fill="white" opacity="0.1"/>

  <!-- Category badge -->
  <rect x="600" y="280" width="110" height="28" rx="14" fill="white" opacity="0.2"/>

  <!-- Bottom image content suggestion -->
  <rect x="0" y="500" width="1200" height="175" fill="url(#overlay)"/>
  <rect x="80" y="530" width="320" height="16" rx="8" fill="white" opacity="0.2"/>
  <rect x="80" y="558" width="240" height="12" rx="6" fill="white" opacity="0.15"/>

  <!-- Label -->
  <rect x="20" y="20" width="214" height="28" rx="6" fill="black" opacity="0.3"/>
  <text x="127" y="39" font-family="system-ui,sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.9">Capa de projeto/notícia · 1200×675</text>
</svg>
