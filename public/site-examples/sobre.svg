<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#light)"/>

  <!-- Background circles -->
  <circle cx="700" cy="100" r="220" fill="#fbbf24" opacity="0.2"/>
  <circle cx="100" cy="700" r="200" fill="#c2410c" opacity="0.2"/>

  <!-- Group of people (abstract) -->
  <!-- Person 1 (left) -->
  <circle cx="260" cy="330" r="55" fill="white" opacity="0.2"/>
  <rect x="215" y="385" width="90" height="130" rx="45" fill="white" opacity="0.2"/>

  <!-- Person 2 (center, taller) -->
  <circle cx="400" cy="300" r="65" fill="white" opacity="0.28"/>
  <rect x="347" y="365" width="106" height="160" rx="53" fill="white" opacity="0.28"/>

  <!-- Person 3 (right) -->
  <circle cx="540" cy="330" r="55" fill="white" opacity="0.2"/>
  <rect x="495" y="385" width="90" height="130" rx="45" fill="white" opacity="0.2"/>

  <!-- Hands joining / star at center bottom -->
  <circle cx="400" cy="590" r="30" fill="white" opacity="0.15"/>
  <line x1="280" y1="590" x2="370" y2="590" stroke="white" stroke-opacity="0.2" stroke-width="8" stroke-linecap="round"/>
  <line x1="430" y1="590" x2="520" y2="590" stroke="white" stroke-opacity="0.2" stroke-width="8" stroke-linecap="round"/>

  <!-- Label -->
  <rect x="20" y="20" width="200" height="28" rx="6" fill="black" opacity="0.3"/>
  <text x="120" y="39" font-family="system-ui,sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.9">Seção Sobre · 800×800</text>
</svg>
